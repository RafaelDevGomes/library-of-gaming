<!DOCTYPE html>

<head>

   <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">

            <a class="navbar-brand d-flex align-items-center" href="../../index.html">

                <span class="logo-text">
                    LIBRARY OF GAMING
                </span>

            </a>

            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav mx-auto">

                    <li class="nav-item px-lg-3">
                        <a class="nav-link active" href="../../index.html">home</a>
                    </li>

                    <li class="nav-itemz px-lg-3">
                        <a class="nav-link" href="../jogos/index.html">jogos</a>

                    <li class="nav-item px-lg-3">

                    </li>

                    <li class="nav-item px-lg-3">
                        <a class="nav-link" href="../noticias/index.html">notícias</a>
                    </li>

                </ul>

                <form class="d-flex align-items-center">

                    <input class="form-control pesquisa" type="search" placeholder="🔍 buscar jogos">

                    <button class="btn botao-login ms-3">
                        LOGIN
                    </button>

                </form>

            </div>

        </div>

    </nav>


    <div class="container mt-5">

        <h1 class="mb-4">
            Bem-vindo à nossa biblioteca!
        </h1>

        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 mb-4">

                <div class="card">

                    <div class="card-body">

                        <h4>Biblioteca</h4>

                        <input
                            type="text"
                            class="form-control my-3"
                            placeholder="Buscar jogo">

                        <h5>Filtros</h5>

                        <div class="accordion" id="filtros">
                            <div class="accordion-item">

                                <h2 class="accordion-header">

                                    <button class="accordion-button collapsed"
                                            data-bs-toggle="collapse"
                                            data-bs-target="#categoria">

                                        Categoria

                                    </button>

                                </h2>

                                <div id="categoria"
                                     class="accordion-collapse collapse">

                                    <div class="accordion-body">

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">
                                                RPG
                                            </label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">
                                                Terror
                                            </label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">
                                                Aventura
                                            </label>
                                        </div>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Jogos -->
            <div class="col-lg-9">

                <div class="row g-4">

                    <div class="col-6 col-md-4 col-lg-3">

                    </div>

                    <div class="col-6 col-md-4 col-lg-3">

                    </div>
                    <div class="col-6 col-md-4 col-lg-3">

                    </div>

                    <div class="col-6 col-md-4 col-lg-3">

                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                       <div class="card">

                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                       <div class="card">

                    </div>
                    <div class="col-6 col-md-4 col-lg-3">

                    </div>
                </div>
