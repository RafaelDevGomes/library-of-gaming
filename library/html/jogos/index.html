<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Library of Gaming</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="../../index.html">
                <img src="img/logo.png" width="40" class="me-2">
                Library of Gaming
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="../../index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="">Jogos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Sobre Nós</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="../noticias/index.html">Notícias</a>
                    </li>

                </ul>

                <button class="btn btn-outline-light">
                    Login
                </button>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <h1 class="mb-4">
            Bem-vindo à nossa biblioteca!
        </h1>

        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 mb-4">

                <div class="card">

                    <div class="card-body">

                        <h4>Biblioteca</h4>

                        <input
                            type="text"
                            class="form-control my-3"
                            placeholder="Buscar jogo">

                        <h5>Filtros</h5>

                        <div class="accordion" id="filtros">
                            <div class="accordion-item">

                                <h2 class="accordion-header">

                                    <button class="accordion-button collapsed"
                                            data-bs-toggle="collapse"
                                            data-bs-target="#categoria">

                                        Categoria

                                    </button>

                                </h2>

                                <div id="categoria"
                                     class="accordion-collapse collapse">

                                    <div class="accordion-body">

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">
                                                RPG
                                            </label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">
                                                Terror
                                            </label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">
                                                Aventura
                                            </label>
                                        </div>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Jogos -->
            <div class="col-lg-9">

                <div class="row g-4">

                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="card">
                            <img src="img/minecraft.jpg" class="card-img-top" alt="">
                        </div>
                    </div>

                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="card">
                            <img src="img/fortinite.jpg" class="card-img-top" alt="">
                        </div>
                    </div>

                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="card">
                            <img src="img/roblox.jpg" class="card-img-top" alt="" style="height: 333px;">
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="card">
                            <img src="img/zelda.jpg" class="card-img-top" alt="" style="height: 333px;">
                        </div>
                    </div>

                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="card">
                            <img src="img/undertale.png" class="card-img-top" alt="">
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                       <div class="card">
                            <img src="img/celeste.jpg" class="card-img-top" alt="">
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                       <div class="card">
                            <img src="img/slime.jpg" class="card-img-top" alt="">
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-lg-3">
                       <div class="card">
                            <img src="img/silkson.jpg" class="card-img-top" alt="">
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
